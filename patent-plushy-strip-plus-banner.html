<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patent Plushy · 5 + Banner Export</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --aqua:#aad9dc;
    --berry:#ba4e70;
    --plum:#725488;
    --teal:#3d7882;
    --deepteal:#22454c;
    --cream:#f2f8f8;
    --bg:#3d7882;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:24px;
    padding:32px 16px 64px;
    font-family:'Nunito',sans-serif;
  }
  /* toolbar is page chrome only — it is NOT part of the exported PNG */
  .toolbar{
    display:flex;
    gap:14px;
    align-items:center;
    flex-wrap:wrap;
    justify-content:center;
  }
  button{
    font-family:'Nunito',sans-serif;
    font-weight:900;
    font-size:.85rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--cream);
    background:linear-gradient(135deg, var(--berry), var(--plum));
    border:none;
    border-radius:999px;
    padding:14px 30px;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(186,78,112,.35);
    transition:transform .15s ease;
  }
  button:hover{transform:translateY(-2px);}
  button:disabled{opacity:.45;cursor:wait;transform:none;}
  .status{
    color:var(--aqua);
    font-weight:800;
    font-size:.75rem;
    letter-spacing:.14em;
    text-transform:uppercase;
  }
  canvas{
    max-width:100%;
    height:auto;
    border-radius:18px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
</style>
</head>
<body>

<div class="toolbar">
  <button id="dl" disabled>Download PNG</button>
  <span class="status" id="status">loading images…</span>
</div>

<canvas id="c"></canvas>

<script>
/* ============================================================
   CAREtech portrait strip export — teal / aqua / berry / plum palette
   Row 1 — five tall portrait frames (2:3):
     patent_plushy_01 · 02 · 03 · 04 · 05
   Row 2 — patent_plushy_06 (2371×621) spanning the full width,
     frame proportioned to the source so nothing is cropped.
   Portrait images fill their frames (object-fit: cover — cropping OK).
   No text on the composition.
   Exports at full canvas resolution (print quality).
   ============================================================ */

const SOURCES = [
  'images/patent_plushy_01.png',
  'images/patent_plushy_02.png',
  'images/patent_plushy_03.png',
  'images/patent_plushy_04.png',
  'images/patent_plushy_05.png',
  'images/patent_plushy_06.png'
];

const COLS = 5, ROWS = 1;

/* ---- composition geometry (all values in export pixels) ---- */
const FRAME_W = 1000, FRAME_H = 1500;    // tall portrait frames (2:3)
const GAP    = 90;
const PAD_X  = 140, PAD_Y = 150;
const BORDER = 12;                        // frame stroke
const RADIUS = 60;                        // outer frame corner radius
const INNER_R = 40;                       // image corner radius
const INSET  = 34;                        // gap between frame edge and image

const GRID_W  = FRAME_W*COLS + GAP*(COLS-1);       // width of the 5-across row
const BANNER_W = GRID_W;                            // banner spans the full row
/* inner area (banner minus 34px inset each side) matches 2371:621 exactly */
const BANNER_H = Math.round((BANNER_W - INSET*2) / (2371/621)) + INSET*2;

const W = PAD_X*2 + GRID_W;                         // canvas width
const H = PAD_Y*2 + FRAME_H + GAP + BANNER_H;       // canvas height

const canvas = document.getElementById('c');
canvas.width = W;
canvas.height = H;
const ctx = canvas.getContext('2d');

/* teal / aqua / berry / plum palette */
const COL = {
  bg:'#3d7882', deepteal:'#22454c', aqua:'#aad9dc',
  berry:'#ba4e70', plum:'#725488'
};

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

/* draw image with object-fit: cover inside a rounded rect */
function drawCover(img,x,y,w,h,r){
  ctx.save();
  roundRect(x,y,w,h,r);
  ctx.clip();
  const scale = Math.max(w/img.width, h/img.height);
  const dw = img.width*scale, dh = img.height*scale;
  ctx.drawImage(img, x+(w-dw)/2, y+(h-dh)/2, dw, dh);
  ctx.restore();
}

function drawFrame(img,x,y,w,h,accent){
  /* soft glow */
  ctx.save();
  ctx.shadowColor = accent.glow;
  ctx.shadowBlur = 70;
  ctx.shadowOffsetY = 24;
  ctx.fillStyle = COL.deepteal;
  roundRect(x,y,w,h,RADIUS);
  ctx.fill();
  ctx.restore();

  /* accent border — cycles aqua / berry / plum across the row */
  ctx.strokeStyle = accent.stroke;
  ctx.lineWidth = BORDER;
  roundRect(x+BORDER/2, y+BORDER/2, w-BORDER, h-BORDER, RADIUS-BORDER/2);
  ctx.stroke();

  /* image — fills the frame, cropped as needed */
  drawCover(img, x+INSET, y+INSET, w-INSET*2, h-INSET*2, INNER_R);
}

/* cycle of accent colors — aqua, berry, plum */
const ACCENTS = [
  { stroke:'#aad9dc', glow:'rgba(170,217,220,0.40)' },   // aqua
  { stroke:'#ba4e70', glow:'rgba(186,78,112,0.45)' },    // berry
  { stroke:'#725488', glow:'rgba(114,84,136,0.45)' }     // plum
];

function drawBackground(){
  ctx.fillStyle = COL.bg;
  ctx.fillRect(0,0,W,H);

  let g = ctx.createRadialGradient(W*0.08, H*0.10, 0, W*0.08, H*0.10, W*0.4);
  g.addColorStop(0,'rgba(114,84,136,0.30)');    // plum wash, left
  g.addColorStop(1,'rgba(114,84,136,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  g = ctx.createRadialGradient(W*0.94, H*0.90, 0, W*0.94, H*0.90, W*0.4);
  g.addColorStop(0,'rgba(186,78,112,0.25)');    // berry wash, right
  g.addColorStop(1,'rgba(186,78,112,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  g = ctx.createRadialGradient(W*0.50, H*0.02, 0, W*0.50, H*0.02, W*0.35);
  g.addColorStop(0,'rgba(170,217,220,0.18)');   // aqua wash, top center
  g.addColorStop(1,'rgba(170,217,220,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);
}

function loadImage(src){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    img.onload = ()=>resolve(img);
    img.onerror = ()=>reject(new Error('could not load '+src));
    img.src = src;
  });
}

async function render(){
  const status = document.getElementById('status');
  const btn = document.getElementById('dl');
  try{
    const imgs = await Promise.all(SOURCES.map(loadImage));

    drawBackground();

    /* row 1 — five portrait frames */
    imgs.slice(0,5).forEach((img, i)=>{
      const x = PAD_X + i * (FRAME_W + GAP);
      const y = PAD_Y;
      const accent = ACCENTS[i % ACCENTS.length];
      drawFrame(img, x, y, FRAME_W, FRAME_H, accent);
    });

    /* row 2 — wide banner spanning the full row width */
    const bannerY = PAD_Y + FRAME_H + GAP;
    drawFrame(imgs[5], PAD_X, bannerY, BANNER_W, BANNER_H, ACCENTS[0]);

    status.textContent = W + ' × ' + H + ' px · ready';
    btn.disabled = false;
  }catch(err){
    status.textContent = err.message + ' — check the images folder';
  }
}

document.getElementById('dl').addEventListener('click', ()=>{
  const status = document.getElementById('status');
  try{
    /* toDataURL throws immediately if the canvas is tainted,
       which gives us a catchable error (toBlob can fail silently) */
    const url = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = url;
    a.download = 'patent-plushy-strip-banner.png';
    document.body.appendChild(a);
    a.click();
    a.remove();
    status.textContent = 'downloaded ♥';
  }catch(err){
    status.textContent = 'export blocked: open this page from a local server (e.g. python3 -m http.server) or GitHub Pages, not by double-clicking the file';
    console.error(err);
  }
});

render();
</script>
</body>
</html>
