<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Computer Plushy · Fabric 6-Image Export</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --rose:#ff8fb8;
    --hot:#ff4f9a;
    --candy:#ff77ac;
    --blush:#ffc2d9;
    --bubble:#ffd9e8;
    --cream:#fff3f8;
    --berry:#c2185b;
    --maroon:#5a0f33;
    --fuchsia:#e91e8c;
    --bg:#2a0a1c;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:24px;
    padding:32px 16px 64px;
    font-family:'Nunito',sans-serif;
  }
  /* toolbar is page chrome only — it is NOT part of the exported PNG */
  .toolbar{
    display:flex;
    gap:14px;
    align-items:center;
    flex-wrap:wrap;
    justify-content:center;
  }
  button{
    font-family:'Nunito',sans-serif;
    font-weight:900;
    font-size:.85rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--cream);
    background:linear-gradient(135deg, var(--fuchsia), var(--hot));
    border:none;
    border-radius:999px;
    padding:14px 30px;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(233,30,140,.35);
    transition:transform .15s ease;
  }
  button:hover{transform:translateY(-2px);}
  button:disabled{opacity:.45;cursor:wait;transform:none;}
  .status{
    color:var(--candy);
    font-weight:800;
    font-size:.75rem;
    letter-spacing:.14em;
    text-transform:uppercase;
  }
  canvas{
    max-width:100%;
    height:auto;
    border-radius:18px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
</style>
</head>
<body>

<div class="toolbar">
  <button id="dl" disabled>Download PNG</button>
  <span class="status" id="status">loading images…</span>
</div>

<canvas id="c"></canvas>

<script>
/* ============================================================
   Kitchen Computer Plushy fabric export — purple/magenta palette
   Two rows of three:
     row 1 — fabric_01 · fabric_02 · fabric_03
     row 2 — fabric_04 · fabric_05 · fabric_06
   No text on the composition.
   Exports at full canvas resolution (print quality).
   ============================================================ */

const SOURCES = [
  'images/fabric_01.png',
  'images/fabric_02.png',
  'images/fabric_03.png',
  'images/fabric_04.png',
  'images/fabric_05.png',
  'images/fabric_06.png'
];

const COLS = 3, ROWS = 2;

/* ---- composition geometry (all values in export pixels) ---- */
const FRAME_W = 1000, FRAME_H = 1250;    // every frame (4:5)
const GAP    = 90;
const PAD_X  = 140, PAD_Y = 150;
const BORDER = 12;                        // hot pink frame stroke
const RADIUS = 60;                        // outer frame corner radius
const INNER_R = 40;                       // image corner radius
const INSET  = 34;                        // gap between frame edge and image

const W = PAD_X*2 + FRAME_W*COLS + GAP*(COLS-1);   // canvas width
const H = PAD_Y*2 + FRAME_H*ROWS + GAP*(ROWS-1);   // canvas height

const canvas = document.getElementById('c');
canvas.width = W;
canvas.height = H;
const ctx = canvas.getContext('2d');

const COL = {
  bg:'#2a0a1c', maroon:'#5a0f33', hot:'#ff4f9a',
  fuchsia:'#e91e8c', rose:'#ff8fb8', candy:'#ff77ac'
};

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

/* draw image with object-fit: cover inside a rounded rect */
function drawCover(img,x,y,w,h,r){
  ctx.save();
  roundRect(x,y,w,h,r);
  ctx.clip();
  const scale = Math.max(w/img.width, h/img.height);
  const dw = img.width*scale, dh = img.height*scale;
  ctx.drawImage(img, x+(w-dw)/2, y+(h-dh)/2, dw, dh);
  ctx.restore();
}

function drawFrame(img,x,y,w,h){
  /* soft glow */
  ctx.save();
  ctx.shadowColor = 'rgba(233,30,140,0.35)';
  ctx.shadowBlur = 70;
  ctx.shadowOffsetY = 24;
  ctx.fillStyle = COL.maroon;
  roundRect(x,y,w,h,RADIUS);
  ctx.fill();
  ctx.restore();

  /* hot pink border */
  ctx.strokeStyle = COL.hot;
  ctx.lineWidth = BORDER;
  roundRect(x+BORDER/2, y+BORDER/2, w-BORDER, h-BORDER, RADIUS-BORDER/2);
  ctx.stroke();

  /* image */
  drawCover(img, x+INSET, y+INSET, w-INSET*2, h-INSET*2, INNER_R);
}

function drawBackground(){
  ctx.fillStyle = COL.bg;
  ctx.fillRect(0,0,W,H);

  let g = ctx.createRadialGradient(W*0.10, H*0.06, 0, W*0.10, H*0.06, W*0.5);
  g.addColorStop(0,'rgba(233,30,140,0.16)');
  g.addColorStop(1,'rgba(233,30,140,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  g = ctx.createRadialGradient(W*0.92, H*0.96, 0, W*0.92, H*0.96, W*0.5);
  g.addColorStop(0,'rgba(255,79,154,0.12)');
  g.addColorStop(1,'rgba(255,79,154,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);
}

function loadImage(src){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    img.onload = ()=>resolve(img);
    img.onerror = ()=>reject(new Error('could not load '+src));
    img.src = src;
  });
}

async function render(){
  const status = document.getElementById('status');
  const btn = document.getElementById('dl');
  try{
    const imgs = await Promise.all(SOURCES.map(loadImage));

    drawBackground();

    imgs.forEach((img, i)=>{
      const col = i % COLS;
      const row = Math.floor(i / COLS);
      const x = PAD_X + col * (FRAME_W + GAP);
      const y = PAD_Y + row * (FRAME_H + GAP);
      drawFrame(img, x, y, FRAME_W, FRAME_H);
    });

    status.textContent = W + ' × ' + H + ' px · ready';
    btn.disabled = false;
  }catch(err){
    status.textContent = err.message + ' — check the images folder';
  }
}

document.getElementById('dl').addEventListener('click', ()=>{
  const status = document.getElementById('status');
  try{
    /* toDataURL throws immediately if the canvas is tainted,
       which gives us a catchable error (toBlob can fail silently) */
    const url = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = url;
    a.download = 'kitchen-computer-plushy-fabrics.png';
    document.body.appendChild(a);
    a.click();
    a.remove();
    status.textContent = 'downloaded ♥';
  }catch(err){
    status.textContent = 'export blocked: open this page from a local server (e.g. python3 -m http.server) or GitHub Pages, not by double-clicking the file';
    console.error(err);
  }
});

render();
</script>
</body>
</html>
